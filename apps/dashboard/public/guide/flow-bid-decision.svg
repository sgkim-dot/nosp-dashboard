<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .step { fill: #ffffff; stroke: #3b82f6; stroke-width: 2; }
    .step-num { fill: #3b82f6; font-weight: 700; font-size: 14px; }
    .step-title { fill: #0f172a; font-weight: 700; font-size: 18px; }
    .step-desc { fill: #475569; font-size: 14px; }
    .decision { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
    .decision-title { fill: #78350f; font-weight: 700; font-size: 16px; }
    .branch-label { fill: #b45309; font-size: 13px; font-weight: 600; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; }
    .end { fill: #d1fae5; stroke: #10b981; stroke-width: 2; }
    .end-text { fill: #064e3b; font-weight: 700; font-size: 16px; }
  </style>

  <!-- 제목 -->
  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">
    다음 입찰가를 정하는 5단계
  </text>
  <text x="500" y="56" text-anchor="middle" font-size="14" fill="#64748b">
    "이 키워드그룹에 얼마 쓸까?" 를 결정하는 흐름
  </text>

  <!-- Step 1 -->
  <rect x="40" y="90" width="220" height="100" rx="14" class="step"/>
  <text x="56" y="116" class="step-num">STEP 1</text>
  <text x="56" y="142" class="step-title">키워드그룹 찾기</text>
  <text x="56" y="166" class="step-desc">상단 "빠른 검색"에</text>
  <text x="56" y="184" class="step-desc">KG 이름 입력 → Enter</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="140" x2="380" y2="140" class="arrow" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="380" y="90" width="240" height="100" rx="14" class="step"/>
  <text x="396" y="116" class="step-num">STEP 2</text>
  <text x="396" y="142" class="step-title">추천 입찰가 확인</text>
  <text x="396" y="166" class="step-desc">우측 상단의 추천 카드에</text>
  <text x="396" y="184" class="step-desc">가격 범위가 표시됨</text>

  <!-- Arrow 2→3 -->
  <line x1="620" y1="140" x2="740" y2="140" class="arrow" marker-end="url(#arrow)"/>

  <!-- Step 3 (decision) -->
  <rect x="740" y="90" width="220" height="100" rx="14" class="decision"/>
  <text x="850" y="124" text-anchor="middle" class="decision-title">STEP 3</text>
  <text x="850" y="150" text-anchor="middle" class="decision-title">과거 적중률은?</text>
  <text x="850" y="178" text-anchor="middle" font-size="13" fill="#78350f">(녹색·황색·빨강)</text>

  <!-- Arrow 3 → branches -->
  <path d="M850 190 V230" class="arrow"/>
  <path d="M850 230 H300 V270" class="arrow" marker-end="url(#arrow)"/>
  <path d="M850 230 H850 V270" class="arrow" marker-end="url(#arrow)"/>

  <!-- Label: 적중률 낮음 -->
  <text x="560" y="222" class="branch-label">≥ 80% (녹색)</text>
  <text x="730" y="222" class="branch-label">&lt; 80% (황·빨강)</text>

  <!-- Step 4-A (낮은 적중률) -->
  <rect x="180" y="270" width="240" height="100" rx="14" class="step"/>
  <text x="196" y="296" class="step-num">STEP 4-A</text>
  <text x="196" y="322" class="step-title">보정 필요</text>
  <text x="196" y="346" class="step-desc">회차 테이블·차트를 보고</text>
  <text x="196" y="364" class="step-desc">추세에 맞게 가격 조정</text>

  <!-- Step 4-B (높은 적중률) -->
  <rect x="730" y="270" width="240" height="100" rx="14" class="step"/>
  <text x="746" y="296" class="step-num">STEP 4-B</text>
  <text x="746" y="322" class="step-title">그대로 사용</text>
  <text x="746" y="346" class="step-desc">추천가 범위 안에서</text>
  <text x="746" y="364" class="step-desc">적당한 값 채택</text>

  <!-- Arrow 4→5 -->
  <path d="M300 370 V410 H500" class="arrow"/>
  <path d="M850 370 V410 H500" class="arrow"/>
  <path d="M500 410 V450" class="arrow" marker-end="url(#arrow)"/>

  <!-- Step 5 (decision) -->
  <rect x="380" y="450" width="240" height="100" rx="14" class="decision"/>
  <text x="500" y="484" text-anchor="middle" class="decision-title">STEP 5</text>
  <text x="500" y="510" text-anchor="middle" class="decision-title">공실 발생률 체크</text>
  <text x="500" y="534" text-anchor="middle" font-size="13" fill="#78350f">높으면 하한 쪽 / 낮으면 상한 쪽</text>

  <!-- END -->
  <rect x="720" y="470" width="240" height="60" rx="14" class="end"/>
  <text x="840" y="495" text-anchor="middle" class="end-text">✅ 입찰가 결정 완료</text>
  <text x="840" y="515" text-anchor="middle" font-size="12" fill="#065f46">엑셀 다운로드로 기록 보관</text>

  <!-- Arrow 5→END -->
  <line x1="620" y1="500" x2="720" y2="500" class="arrow" marker-end="url(#arrow)"/>
</svg>
